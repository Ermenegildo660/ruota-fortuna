<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ruota della fortuna</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

body{
font-family: Arial;
background:#1e1e1e;
color:white;
text-align:center;
margin:0;
padding:20px;
}

canvas{
margin-top:20px;
}

button{
padding:14px 30px;
font-size:18px;
margin-top:20px;
border:none;
border-radius:10px;
background:#ffcc00;
cursor:pointer;
}

#result{
font-size:24px;
margin-top:20px;
}

#history,#stats{
margin-top:25px;
text-align:left;
max-width:420px;
margin-left:auto;
margin-right:auto;
}

</style>
</head>

<body>

<h2>🎡 Ruota della fortuna</h2>

<canvas id="wheel" width="420" height="420"></canvas>

<br>

<button onclick="spin()">GIRA</button>

<div id="result"></div>

<div id="history">
<h3>📜 Cronologia</h3>
<ul id="historyList"></ul>
</div>

<div id="stats">
<h3>📊 Statistiche</h3>
<ul id="statsList"></ul>
</div>

<script>

// nomi ruota

let names = [
"Alessia","Alice","Faty","Gaia","Gaietta",
"Hailee","Jennifer","Lety","Madelyn",
"Mariasole","Muzzina","Rebecca","Sara","A scelta"
];

// canvas

let canvas = document.getElementById("wheel");
let ctx = canvas.getContext("2d");

let angle = 0;
let spinning = false;

// cronologia e statistiche

let history = JSON.parse(localStorage.getItem("history")) || [];

let stats = JSON.parse(localStorage.getItem("stats")) || {};

names.forEach(n=>{
if(!stats[n]) stats[n]=0;
});

// disegno ruota

function drawWheel(){

let arc = Math.PI * 2 / names.length;

ctx.clearRect(0,0,420,420);

for(let i=0;i<names.length;i++){

let start = angle + i * arc;

ctx.beginPath();

ctx.fillStyle = i % 2 ? "#ff4d4d" : "#ffcc00";

ctx.moveTo(210,210);
ctx.arc(210,210,200,start,start+arc);

ctx.fill();

ctx.save();

ctx.translate(210,210);
ctx.rotate(start + arc/2);

ctx.fillStyle="black";
ctx.font="14px Arial";

ctx.fillText(names[i],110,5);

ctx.restore();

}

// freccia

ctx.beginPath();

ctx.fillStyle="white";

ctx.moveTo(210,5);
ctx.lineTo(230,40);
ctx.lineTo(190,40);

ctx.fill();

}

drawWheel();

// cronologia

function updateHistory(){

let list=document.getElementById("historyList");

list.innerHTML="";

history.slice().reverse().forEach(h=>{

let li=document.createElement("li");

li.textContent=h;

list.appendChild(li);

});

}

// statistiche

function updateStats(){

let list=document.getElementById("statsList");

list.innerHTML="";

for(let name in stats){

let li=document.createElement("li");

li.textContent=name+" → "+stats[name];

list.appendChild(li);

}

}

updateHistory();
updateStats();

// animazione spin

function spin(){

if(spinning) return;

spinning=true;

let totalRotation = Math.random()*2000 + 3000;

let duration = 4000;

let start=null;

function animate(timestamp){

if(!start) start=timestamp;

let progress = timestamp-start;

angle += totalRotation * Math.exp(-progress/1500) * 0.0005;

drawWheel();

if(progress < duration){

requestAnimationFrame(animate);

}else{

spinning=false;

finishSpin();

}

}

requestAnimationFrame(animate);

}

// calcolo risultato corretto

function finishSpin(){

let arc = Math.PI * 2 / names.length;

let adjustedAngle = (Math.PI*1.5 - angle) % (Math.PI*2);

if(adjustedAngle < 0){

adjustedAngle += Math.PI*2;

}

let index = Math.floor(adjustedAngle / arc);

let result = names[index];

document.getElementById("result").innerHTML =
"🎉 È uscita: " + result;

history.push(result);

stats[result]++;

localStorage.setItem("history",JSON.stringify(history));
localStorage.setItem("stats",JSON.stringify(stats));

updateHistory();
updateStats();

}

</script>

</body>
</html>
